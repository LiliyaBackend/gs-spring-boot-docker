trigger:
- main

resources:
- repo: self

variables:
  dockerRegistryServiceConnection: '525e34c8-3947-4412-8146-d9f2c10fba37'
  imageRepository: 'liliyabackendgsspringbootdocker'
  dockerfilePath: '$(Build.SourcesDirectory)/complete/Dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - script: chmod +x ./complete/gradlew
      displayName: 'Make Gradle wrapper executable'

    - script: cd complete && ./gradlew build
      displayName: 'Build with Gradle'

    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

- stage: Deploy
  displayName: Deploy to Azure Web App
  dependsOn: Build
  jobs:
  - job: Deploy
    displayName: Deploy
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: AzureWebAppContainer@1
      displayName: Deploy to Web App
      inputs:
        azureSubscription: 'azure-connection'
        appName: 'lab6-webapp-liliia'
        containers: 'lab6registryliliia.azurecr.io/liliyabackendgsspringbootdocker:$(tag)'