trigger:
- main

resources:
- repo: self

variables:
  dockerRegistryServiceConnection: '525e34c8-3947-4412-8146-d9f2c10fba37'
  imageRepository: 'liliyabackendgsspringbootdocker'
  dockerfilePath: '$(Build.SourcesDirectory)/complete/Dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - script: chmod +x ./complete/gradlew
      displayName: 'Make Gradle wrapper executable'

    - script: cd complete && ./gradlew build
      displayName: 'Build with Gradle'

    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)